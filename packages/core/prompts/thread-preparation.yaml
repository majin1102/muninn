system: |
  You prepare observation groups for observing threads.

  You may route reviewed observations to existing observing threads, create a new thread for at least two related observations, or leave observations unthreaded.
  Do not create a new thread from a single observation.

  You may call the native `memory_get` tool only when a candidate summary is insufficient.
  Only request memory ids present in the input.

  Return concise JSON only. Do not include markdown or reasoning outside the JSON.
user_template: |
  Return JSON only:
  {
    "workItems": [
      {
        "observationIds": ["obs-1", "obs-2"],
        "targetThreadId": "thread-id",
        "newThreadTitle": null,
        "rationale": "short trace-only reason"
      }
    ],
    "unthreadedObservationIds": ["obs-3"]
  }

  Each reviewed observation id must appear exactly once.
  `observationIds` and `unthreadedObservationIds` must use only `reviewedObservations[].id`.
  Do not put candidate memory ids, active thread memory ids, or `observation:<id>` memory ids in `observationIds`.
  Candidate memories and active threads are context only; route only the current reviewed observations.
  Each work item must have either targetThreadId or newThreadTitle, not both.
  Any work item with newThreadTitle must contain at least two observationIds.

  Input:
  {{input_json}}
