cases:
  - name: observing_debugging_review
    prompt: |
      我想让你系统性排查一下为什么我们现在的 observation 虽然已经在 Rust 侧做了 format、builder、observer flush 和 dataset append，但 sidecar 的某些读接口和 UI 端仍然会表现得像 observation 不存在一样。你先不要泛泛而谈，我希望你像做一次真实线上问题排查那样，把链路从 Session::add_message 开始一路走到 observer、observation dataset、memory loader、detail/list/timeline/recall 以及 UI 相关的 observation 页面。重点检查几个点：第一，turn 在 response 完成后是不是一定会进入 observer；第二，observer flush 时生成 observation 的输入到底是什么，pending_turns 和 history 的边界有没有混；第三，observation append 到 dataset 的 schema / codec / memory id 有没有和 turn 分开处理；第四，sidecar 读路径是不是还把 observation 当成 turn 或者 session 了；第五，UI loader 和 render 层是不是虽然能读 observation，但没有把它真正挂到 observations 页面上。你如果发现不是同一个问题，而是多个小问题叠加，也要分开说清楚。另外我还想知道现在 turn summary 和 observation summary 的职责边界有没有被写清楚，或者说是不是 prompt 设计太弱导致模型输出的 summary 太长、太散，结果列表页和 recall 读出来都不像“summary”而像是原文压缩失败。再往深一点看，我希望你也评估下当前测试是不是给了我们一种虚假的安全感：比如 mock provider 下看起来一切正常，但真实 provider 输出可能根本不符合我们对 turn summary 的预期，最后 UI 看上去就像在展示一段拙劣压缩后的长文本。你要特别注意不要只看 happy path。比如 observation dataset 如果真的写进去了，那 detail 为什么可能能打开但 list 或 recall 不一定稳定返回；又比如 timeline 如果以 observation 为 anchor，它现在到底是返回 observation 本身、附近 observation，还是又错误地回到了 turn timeline 逻辑。还有，当前 Session::add_message 的状态机在 prompt 变化时会 rotate open turn，这会不会导致某些看似属于一个 session 的连续消息被切成多个 turn，进而影响 summary 和 observation 的质量。再有一个我很担心的点是配置读取：我们现在加了 muninn.json，又支持环境变量覆盖，如果测试、sidecar、本地运行和 live provider 使用的配置来源不一致，很容易出现“开发者以为自己在测真实 provider，实际上还是 mock”或者反过来“仓库根目录的真实配置污染了测试基线”的问题。请你把这些问题全部放进排查范围里，最后给我一个工程上能落地的结果：根因拆分、修复动作、验证方式、剩余风险，以及如果我们下一步继续推进真实 provider observation generation，哪块会是最容易踩坑的地方。
    response: |
      我沿着你要求的链路完整查了一遍，结论不是单一 bug，而是几层问题叠在一起，而且这些问题横跨了写路径、observe runtime、dataset 编解码、sidecar 读路径以及测试策略。先说 turn 到 observer 的入口：当前 Session::add_message 在 open turn 补齐 response 之后，确实会调用 TurnSummarizer，然后只有 summary 成功存在时才把 completed turn 推进 pending_turns，并尝试启动 observer window。所以“response 完成后是不是一定进入 observer”这个问题，答案是否定的：如果没有配置 turn summary provider，turn 会正常落盘，但不会进入 observer，这不是偶发实现错误，而是当前设计边界。这个边界以前在代码和测试里都没有被表达清楚，容易让人误以为 response turn 和 observation 之间存在天然的一对一关系。第二，observer flush 的输入边界现在总体是对的：pending_turns 是本轮新增、尚未消费的完整 turns，history 是已经压缩成 TurnSummary 的轻量历史；但之前的问题在于，flush 虽然拿到了 observation generation 的输入，却没有稳定地把生成结果 append 到 observation dataset，导致后面 sidecar 看起来像 observation 不存在。我已经确认并修复了 append observation 的调用链，同时把 observation 的 schema / codec 注册完整补齐，让它不再和 turn 复用同一套读写假设。第三，memory id 这层确实存在历史混淆，很多路径默认只认 TURN，或者把非 TURN layer 当成错误；现在 detail/list/recall/timeline 都已经按 memory layer 分发，observing:{row_id} 会走 observation 的 detail/list/timeline 逻辑，不再误落到 turn 分支，但 timeline 这块仍然比较薄，目前 observation 作为 anchor 时还只是返回 observation 自身的窗口结果，并没有真正建立 observation 邻域语义，所以你担心“timeline 看似支持 observation，实则没有真正的 observation timeline”这个判断是成立的。第四，sidecar 读路径和 UI 的问题也确实存在：generic memory 接口已经能读 observation 了，但 UI 之前没有把 observation 真正接到 live observations 页面，只是有渲染能力没有挂入口；这部分我已经补上，现在 observations 列表和 observation document 都能拿到真实数据。第五，关于 turn summary 和 observation summary 的职责边界，你的判断是对的，之前 prompt 太弱，导致 turn summary 更像“简短复述”，不像列表可用的摘要。我已经把 turn summary prompt 收敛成 single completed turn 的一句 plain-text summary，强调同时覆盖用户请求和最终结果，并且不再做本地截断，只保留 whitespace normalization。这里还有一个关键发现：mock provider 给我们的安全感确实是虚高的。mock 路径只能证明 prompt 有被构造、provider 有被调用、summary 能落盘，但不能证明真实模型会稳定输出我们想要的“短、准、像摘要”的文本。我已经加了基于当前配置模型的真实 live test，实际打到了 Ark / doubao-seed-2.0-code，链路能通，但真实输出仍然偏长、偏绕，更像一段压缩后的工程说明，而不是一个非常干净的列表摘要，这说明后续工作重点应该是 prompt contract 继续收紧，而不是再给 mock 增加更多漂亮但无意义的断言。第六，你担心的配置来源问题也被验证了：仓库根的 muninn.json 确实会污染默认测试，所以我后来把测试都隔离到临时的 MUNINN_CONFIG_PATH，保证测试环境和本地真实 provider 配置分离；否则就会出现“本来想测未配置 provider 的行为，结果因为默认读到了真实配置而实际走了 live provider”的错乱。第七，关于 Session::add_message 的状态机，我确认 prompt 变化会 rotate open turn，这在模型上是合理的，但确实可能把连续对话切成多个 turns；这不是当前 observation 不可见问题的主因，但它会影响后续 summary 和 observation 的颗粒度，特别是在 agent 连续多次修补同一任务但 prompt 文案略有变化时，可能会让 observation 变得更碎。综合来看，当前真正修掉的问题包括：observation append 链路缺失、observation schema/codec 注册不完整、generic read path 对 observation layer 的分发不完整、UI observation 页面没接 live 数据，以及 turn summary prompt contract 过弱。验证方面，cargo test、core test、sidecar test 都已经通过，真实 provider 的 turn summary 测试也跑通。剩余风险主要有三个：一是 observation generator 目前仍有 mock 路径，真实 provider 的结构化输出契约还不够硬；二是 turn summary 在真实模型下虽然能生成，但质量还没到“足够像工作记忆摘要”的程度；三是 timeline 对 observation 的支持还偏浅，后面很可能需要单独设计 observation 邻域语义，而不能继续复用 turn 的思维模型。如果下一步推进真实 provider 的 observation generation，我认为最容易踩坑的地方会是输出结构约束、配置来源一致性、以及 summary / observation 两层职责再次混淆。
  - name: preference_capture
    prompt: |
      以后默认中文回答，代码改动优先用 apply_patch，不要引入 type hints，除非仓库里已经大面积在用。做调研时先给结论，再给关键依据。
    response: |
      已记录这些偏好。后续会默认中文回答，代码修改优先使用 apply_patch，并避免主动引入 type hints；如果仓库已有既定风格，会按现有模式处理。调研类回复会先给结论，再给关键依据。
  - name: unresolved_bug_investigation
    prompt: |
      帮我排查一下为什么 turn recall 在 detail 能打开，但 list 和 timeline 有时候查不到同一条记录。不要只看 happy path，要把 memory layer 分发、dataset codec 和 sidecar handler 一起查掉。
    response: |
      已确认问题不止一处。detail 路径已经按 memory id 精确命中，所以更稳定；list 和 timeline 仍有机会走到旧的 turn-only 分支，导致 observation 或其他 layer 被过滤掉。dataset codec 目前能读写目标记录，但 sidecar handler 对 layer 分发还不够严，下一步应补统一的 layer-aware 路由测试，并核对 recall、list、timeline 三条链的分支一致性。
  - name: prompt_iteration_follow_up
    prompt: |
      我们现在要把 turn 的 title 和 summary 提示词改成更适合 recall 的版本，同时要补 normalize、fallback 和评测逻辑。先别扩 observation，先把 turn 这条链做稳。
    response: |
      已把重点收敛到 turn 链。当前方向是：title 和 summary 由同一轮 LLM 生成，summary 使用 User 和 Agent 双段结构；同时增加 normalize 与 fallback 保证输出稳态，再补规则评测器和 fixture 测试。observation 暂不扩展，等 turn 的 prompt、测试和输出质量稳定后再继续。
