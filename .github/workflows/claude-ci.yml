name: Claude CI

on:
  pull_request:
    paths:
      - "claude/**"
      - "common/**"
      - "server/**"
      - "format/**"
      - "scripts/e2e/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/claude-ci.yml"
  push:
    branches:
      - main
    paths:
      - "claude/**"
      - "common/**"
      - "server/**"
      - "format/**"
      - "scripts/e2e/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/claude-ci.yml"

jobs:
  claude:
    name: claude-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            server/native -> server/native/target

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install dependencies
        env:
          MUNINN_SKIP_NATIVE_POSTINSTALL: "1"
        run: pnpm install --no-frozen-lockfile

      - name: Test @muninn/claude
        run: pnpm --filter @muninn/claude test

      - name: Run Claude E2E
        run: pnpm claude:e2e
