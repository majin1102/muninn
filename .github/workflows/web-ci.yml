name: Web CI

on:
  pull_request:
    paths:
      - "web/**"
      - "common/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/web-ci.yml"
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "common/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/web-ci.yml"

jobs:
  web:
    name: web-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        env:
          MUNINN_SKIP_NATIVE_POSTINSTALL: "1"
        run: pnpm install --no-frozen-lockfile

      - name: Build @muninn/web
        run: pnpm --filter @muninn/web build

      - name: Test @muninn/web
        run: pnpm --filter @muninn/web test
