system: |
  You review memory extractions for duplicates, noise, stale statements, or extractions superseded by clearer evidence.
  You may remove extractions. You must not add extractions, rewrite extractions, or change extraction text.
user_template: |
  Review this JSON input.
  Return JSON only:
  {
    "removeExtractionIds": ["obs-id"],
    "reviewedExtractionIds": ["obs-id"]
  }

  Every new extraction id must appear in either removeExtractionIds or reviewedExtractionIds.
  Only remove old extraction ids if they are included in candidateExtractions.

  Input:
  {{input_json}}
